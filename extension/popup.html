<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ESG Mefali</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1 id="title">ESG Mefali</h1>
    <div id="status"></div>
    <form id="login-form">
      <label for="email" id="lbl-email">Email</label>
      <input id="email" type="email" required />
      <label for="password" id="lbl-password">Password</label>
      <input id="password" type="password" required />
      <button type="submit" id="btn-login">Login</button>
    </form>
    <div id="profile" hidden>
      <p><strong id="company-name"></strong></p>
      <button id="btn-refresh">Refresh patterns</button>
      <button id="btn-logout">Logout</button>
    </div>
    <p class="hint" id="hint-notifications">
      Notifications système (P2) — autorisez-les dans les préférences de votre
      navigateur ou de votre OS pour recevoir les rappels d'échéance &lt; 24 h.
      La révocation se fait au même endroit ; ESG Mefali continuera à
      fonctionner sans cet opt-in.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
