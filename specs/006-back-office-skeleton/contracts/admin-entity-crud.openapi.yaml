openapi: 3.1.0
info:
  title: F06 — Admin Entity CRUD (generic)
  version: 0.1.0
  description: |
    Routes CRUD génériques montées par EntityRegistry sous `/admin/{entity}`.
    Le segment `{entity}` est le nom enregistré (`demo_indicator`, `sources`, `indicateurs`, ...).

paths:
  /admin/{entity}/:
    get:
      summary: List paginated (cursor-based)
      parameters:
        - name: entity
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
          description: opaque base64(JSON{created_at,id})
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, outdated, pending] }
        - name: count
          in: query
          schema: { type: string, enum: [estimate, exact], default: estimate }
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                type: object
                required: [items, total_estimate]
                properties:
                  items:
                    type: array
                    items: { type: object }
                  next_cursor:
                    type: string
                    nullable: true
                  total_estimate:
                    type: integer
        '403':
          description: Not admin
    post:
      summary: Create draft
      parameters:
        - name: entity
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Created in status=draft
          headers:
            ETag:
              schema: { type: string, example: '"v1"' }
          content:
            application/json:
              schema: { type: object }
        '422':
          description: Validation failed

  /admin/{entity}/{id}:
    get:
      summary: Read one
      parameters:
        - { name: entity, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Found
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema: { type: object }
        '404':
          description: Not found
    put:
      summary: Update (draft direct ; published triggers new version)
      parameters:
        - { name: entity, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: If-Match
          in: header
          required: true
          schema: { type: string, example: '"v1"' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Updated (draft) or new version created (published)
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema: { type: object }
        '412':
          description: Precondition Failed (If-Match mismatch)
        '422':
          description: Validation failed

  /admin/{entity}/{id}/versions:
    get:
      summary: List versions
      parameters:
        - { name: entity, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Versions, ordered desc by valid_from
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        valid_from: { type: string, format: date-time }
                        valid_to: { type: string, format: date-time, nullable: true }
                        status: { type: string }
                        published_by: { type: string, format: uuid, nullable: true }
