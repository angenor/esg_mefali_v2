openapi: 3.1.0
info:
  title: F06 — Admin Publish workflow
  version: 0.1.0

paths:
  /admin/{entity}/{id}/publish:
    post:
      summary: Publish a draft (gate = all linked sources verified)
      parameters:
        - { name: entity, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: If-Match
          in: header
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Published, audit_log entry written, status=published
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [published] }
                  version: { type: integer }
                  published_by: { type: string, format: uuid }
        '412':
          description: Precondition Failed (If-Match mismatch)
        '422':
          description: Sources not all verified — list returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object
                    properties:
                      code: { type: string, example: 'sources_not_verified' }
                      missing_sources:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            status: { type: string, enum: [draft, pending, rejected, outdated] }
                            label: { type: string }
        '403':
          description: Not admin
