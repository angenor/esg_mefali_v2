openapi: 3.0.3
info:
  title: F30 — Attestation Vérifiable API
  version: "0.1.0"
paths:
  /me/attestations:
    post:
      summary: Générer une attestation
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationOut"
        "422":
          description: Scores manquants ou invalides.
        "503":
          description: Clé Ed25519 non configurée.
    get:
      summary: Historique des attestations de la PME
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AttestationOut" }
                  total: { type: integer }
  /me/attestations/{id}/download:
    get:
      summary: Télécharger le PDF original
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: PDF
          content:
            application/pdf: {}
        "404": { description: Not found / RLS }
  /me/attestations/{id}/revoke:
    post:
      summary: Révoquer une attestation (PME)
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
      responses:
        "200": { description: OK }
        "404": { description: Not found / RLS }
        "409": { description: Déjà révoquée }
  /admin/attestations/{id}/revoke:
    post:
      summary: Révoquer une attestation (admin)
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
      responses:
        "200": { description: OK }
        "403": { description: Rôle insuffisant }
        "404": { description: Not found }
        "409": { description: Déjà révoquée }
  /verify/{public_id}:
    get:
      summary: Page publique HTML de vérification
      responses:
        "200":
          description: HTML
          content:
            text/html: {}
        "404": { description: Inconnu }
        "429": { description: Rate-limited }
  /verify/{public_id}/json:
    get:
      summary: Données JSON de vérification (tiers)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicVerification"
        "404": { description: Inconnu }
        "429": { description: Rate-limited }
  /verify/_pubkey:
    get:
      summary: Clé publique Ed25519 (hex)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pubkey_hex: { type: string }
                  pubkey_fingerprint: { type: string }
                  algorithm: { type: string, example: ed25519 }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GenerateRequest:
      type: object
      required: [scores_to_include]
      properties:
        scores_to_include:
          type: array
          minItems: 1
          items:
            type: string
        valid_for_months:
          type: integer
          enum: [3, 6, 12]
          default: 6
    RevokeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
    AttestationOut:
      type: object
      properties:
        id: { type: string, format: uuid }
        public_id: { type: string, format: uuid }
        status: { type: string, enum: [active, expired, revoked] }
        generated_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
        scores_inclus: { type: object, additionalProperties: true }
        referentiels_versions: { type: object, additionalProperties: { type: string } }
        signature_ed25519: { type: string }
        pubkey_fingerprint: { type: string }
        hash_document: { type: string }
        download_url: { type: string }
        verify_url: { type: string }
    PublicVerification:
      type: object
      properties:
        public_id: { type: string, format: uuid }
        status: { type: string, enum: [active, expired, revoked] }
        entreprise_name: { type: string }
        generated_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
        scores: { type: object, additionalProperties: true }
        referentiels_versions: { type: object, additionalProperties: { type: string } }
        hash_document: { type: string }
        signature_ed25519: { type: string }
        pubkey_fingerprint: { type: string }
        download_url: { type: string }
