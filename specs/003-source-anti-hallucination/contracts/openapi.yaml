openapi: 3.1.0
info:
  title: F03 — Source & Sourçage Anti-Hallucination
  version: 0.1.0
  description: Endpoints exposés par F03. Réutilise auth + RLS de F02.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SourceVerificationStatus:
      type: string
      enum: [pending, verified, outdated, rejected]
    Source:
      type: object
      additionalProperties: false
      required: [id, url, title, publisher, verification_status, captured_at]
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        title: { type: string }
        publisher: { type: string }
        version: { type: string, nullable: true }
        date_publi: { type: string, format: date, nullable: true }
        page: { type: string, nullable: true }
        section: { type: string, nullable: true }
        captured_at: { type: string, format: date-time }
        verified_at: { type: string, format: date-time, nullable: true }
        verification_status: { $ref: '#/components/schemas/SourceVerificationStatus' }
        notes: { type: string, nullable: true }
    SourceList:
      type: object
      additionalProperties: false
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Source' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        offset: { type: integer, minimum: 0 }
    UnsourcedClaimAggRow:
      type: object
      additionalProperties: false
      required: [claim, freq, last_seen]
      properties:
        claim: { type: string }
        freq: { type: integer, minimum: 1 }
        last_seen: { type: string, format: date-time }
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

paths:
  /sources:
    get:
      summary: List sources (admin only) — paginated, filtrable
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: q, schema: { type: string }, required: false }
        - { in: query, name: publisher, schema: { type: string }, required: false }
        - { in: query, name: status, schema: { $ref: '#/components/schemas/SourceVerificationStatus' }, required: false }
        - { in: query, name: limit, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { in: query, name: offset, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceList' } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /sources/{id}:
    get:
      summary: Get one source (lecture publique unitaire pour picto + page de vérif F30)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Source' } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /admin/unsourced-claims:
    get:
      summary: Liste agrégée des claims non sourcés (RLS, tenant courant)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: days, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
        - { in: query, name: limit, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UnsourcedClaimAggRow' }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
