openapi: 3.1.0
info:
  title: F09 — Indicateurs
  version: 1.0.0
servers:
  - url: /admin
paths:
  /indicateurs:
    get:
      summary: List indicateurs (paginated, filterable)
      parameters:
        - {name: pillar, in: query, schema: {type: string, enum: [E,S,G,transverse]}}
        - {name: search, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [draft,published,archived,outdated]}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: page_size, in: query, schema: {type: integer, default: 50}}
      responses:
        '200': {description: OK}
    post:
      summary: Create indicateur (draft)
      responses: {'201': {description: Created}, '409': {description: Code already exists}}
  /indicateurs/{id}:
    get: {summary: Get indicateur, responses: {'200': {description: OK}, '404': {description: Not found}}}
    patch:
      summary: Update indicateur (draft only OR creates new version)
      parameters: [{name: If-Match, in: header, required: true, schema: {type: string}}]
      responses: {'200': {description: OK}, '412': {description: ETag mismatch}}
    delete:
      summary: Delete (only if status=draft and never published)
      responses: {'204': {description: Deleted}, '409': {description: Cannot delete published}}
  /indicateurs/{id}/publish:
    post:
      summary: Publish indicateur (requires >=1 verified source)
      responses: {'200': {description: Published}, '409': {description: Sourcing missing or invalid}}
  /indicateurs/{id}/archive:
    post: {summary: Archive published indicateur}
