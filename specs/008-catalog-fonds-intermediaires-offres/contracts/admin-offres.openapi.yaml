openapi: 3.1.0
info: { title: F08 — Admin Offres API, version: 0.1.0 }
servers: [{ url: /admin }]
security: [{ BearerAdmin: [] }]
paths:
  /offres:
    get:
      summary: FR-009 Liste paginée + filtres (consommé aussi par F25 via /catalog public)
      parameters:
        - { name: fonds, in: query, schema: { type: string, format: uuid } }
        - { name: intermediaire, in: query, schema: { type: string, format: uuid } }
        - { name: pays, in: query, schema: { type: string } }
        - { name: secteur, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [draft, published, archived, outdated] } }
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses: { '200': { description: OK } }
    post:
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OffreCreate' } } } }
      responses:
        '201': { description: Created }
        '409': { description: no_active_accreditation OR source_not_verified }
  /offres/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      responses: { '200': { description: OK + lazy outdated check } }
    put:
      parameters: [{ name: If-Match, in: header, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OffreUpdate' } } } }
      responses: { '200': { description: OK }, '412': { description: ETag mismatch } }
    delete:
      parameters: [{ name: If-Match, in: header, required: true, schema: { type: string } }]
      responses: { '204': { description: Soft-deleted } }
  /offres/{id}/publish:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }, { name: If-Match, in: header, required: true, schema: { type: string } }]
    post:
      responses: { '200': { description: Published }, '409': { description: publish_gate_failed } }
  /offres/{id}/effective:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      summary: FR-005 Calcul effectif (arbre 2 niveaux)
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/EffectiveResponse' } } }
  /offres/{id}/refresh:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }, { name: If-Match, in: header, required: true, schema: { type: string } }]
    post:
      summary: Action admin "Actualiser" (reset needs_refresh + publish nouvelle version d'Offre alignée)
      responses: { '200': { description: Refreshed (version+1) } }
  /offres/recheck-status:
    post:
      summary: Bulk lazy outdated check (admin manuel)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  scanned: { type: integer }
                  marked_outdated: { type: integer }
components:
  securitySchemes: { BearerAdmin: { type: http, scheme: bearer } }
  schemas:
    Money: { type: object, properties: { amount: { type: string }, currency: { type: string } } }
    Critere: { $ref: 'admin-fonds.openapi.yaml#/components/schemas/Critere' }
    Document: { $ref: 'admin-fonds.openapi.yaml#/components/schemas/Document' }
    EffectiveLayer:
      type: object
      properties:
        criteres: { type: array }
        documents: { type: array }
        frais: { type: object }
        delais: { type: object }
        referentiel: { type: object, nullable: true }
        deadline: { type: string, format: date-time, nullable: true }
    EffectiveResponse:
      type: object
      properties:
        fonds_layer: { $ref: '#/components/schemas/EffectiveLayer' }
        intermediaire_layer: { $ref: '#/components/schemas/EffectiveLayer' }
        criteres_effectifs: { type: array }
        documents_effectifs: { type: array }
        frais_effectifs: { $ref: '#/components/schemas/Money' }
        delais_effectifs_jours: { type: integer }
        referentiel_effectif: { type: object }
        accepted_languages: { type: array, items: { type: string, enum: [fr, en] } }
        deadline: { type: string, format: date-time, nullable: true }
        effective_warning: { type: array, items: { type: string } }
    Offre:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        fonds_id: { type: string, format: uuid }
        intermediaire_id: { type: string, format: uuid }
        name: { type: string }
        accepted_languages: { type: array, items: { type: string, enum: [fr, en] } }
        deadline: { type: string, format: date-time, nullable: true }
        criteres_offre_specifiques: { type: array }
        documents_specifiques: { type: array }
        frais_specifiques: { type: object }
        delais_specifiques: { type: object }
        needs_refresh: { type: boolean }
        source_ids: { type: array, items: { type: string, format: uuid } }
        version: { type: integer }
        status: { type: string, enum: [draft, published, archived, outdated] }
        etag: { type: string }
    OffreCreate:
      allOf: [{ $ref: '#/components/schemas/Offre' }]
      required: [fonds_id, intermediaire_id, name, source_ids]
    OffreUpdate: { $ref: '#/components/schemas/OffreCreate' }
